<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLED 96x96 温控器界面</title>
  <style>
    :root {
      --bg: #101217;
      --panel: #171b22;
      --bezel: #0c0f14;
      --oled: #8cf08c;
      --oled-dim: rgba(140, 240, 140, 0.55);
      --oled-ghost: rgba(140, 240, 140, 0.16);
      --crt: rgba(140, 240, 140, 0.07);
      --size: 384px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, #1b222d 0, transparent 35%),
        radial-gradient(circle at 90% 90%, #1b2c1b 0, transparent 30%),
        linear-gradient(180deg, #0d1016, #141923 60%, #0e1117);
      color: #d8f3d8;
      font-family: "Share Tech Mono", "JetBrains Mono", "Consolas", monospace;
      padding: 24px;
    }

    .layout {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .title {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #b6d5b6;
      opacity: 0.9;
    }

    .device {
      width: calc(var(--size) + 30px);
      padding: 14px;
      border-radius: 20px;
      background: linear-gradient(180deg, #2b313a, #151921 26%, #10141b);
      border: 1px solid #313846;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 18px 40px rgba(0, 0, 0, 0.5);
    }

    .screen {
      position: relative;
      width: var(--size);
      height: var(--size);
      background: var(--bezel);
      border: 1px solid #252b36;
      border-radius: 8px;
      overflow: hidden;
      image-rendering: pixelated;
      box-shadow:
        inset 0 0 0 1px #0a0d12,
        inset 0 0 24px rgba(140, 240, 140, 0.08);
    }

    .pixels,
    .scan {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .pixels {
      background-image:
        linear-gradient(var(--crt) 1px, transparent 1px),
        linear-gradient(90deg, var(--crt) 1px, transparent 1px);
      background-size: calc(var(--size) / 96 * 1px) calc(var(--size) / 96 * 1px);
      opacity: 0.75;
    }

    .scan {
      background: linear-gradient(180deg, transparent 0%, rgba(140, 240, 140, 0.05) 50%, transparent 100%);
      animation: sweep 5s linear infinite;
    }

    @keyframes sweep {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .ui {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: 13% 9% 1fr 14%;
      padding: 10px;
      color: var(--oled);
      font-size: 11px;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--oled-dim);
      font-size: 9px;
    }

    .tabs {
      display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      border: 1px solid var(--oled-dim);
      height: 100%;
    }

    .tab {
      display: grid;
      place-items: center;
      cursor: pointer;
      user-select: none;
      color: var(--oled-dim);
      border-right: 1px solid var(--oled-dim);
    }

    .tab:last-child {
      border-right: none;
    }

    .tab.active {
      background: var(--oled);
      color: #031503;
      font-weight: 700;
    }

    .body {
      margin-top: 6px;
      border: 1px solid var(--oled-dim);
      padding: 6px;
      display: grid;
      grid-auto-rows: minmax(18px, auto);
      gap: 4px;
      align-content: start;
    }

    .line {
      display: grid;
      grid-template-columns: 38% 62%;
      align-items: center;
      min-height: 18px;
      color: var(--oled-dim);
    }

    .line .label {
      opacity: 0.95;
    }

    .line .value {
      justify-self: stretch;
      text-align: left;
      padding: 2px 4px;
      min-height: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--oled);
      border: 1px solid transparent;
    }

    .line .value.blink {
      animation: blink-limit 0.32s steps(2, end);
    }

    @keyframes blink-limit {
      0% { background: var(--oled); color: #031503; }
      100% { background: transparent; color: var(--oled); }
    }

    .line.selected .value {
      background: var(--oled);
      color: #031503;
      border-color: var(--oled);
      font-weight: 700;
    }

    .line.locked .value {
      color: var(--oled-dim);
    }

    .scene-hint {
      color: var(--oled-dim);
      font-size: 9px;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .footer {
      margin-top: 6px;
      border: 1px solid var(--oled-dim);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 9px;
      color: var(--oled-dim);
    }

    .footer .hint.warn {
      color: var(--oled);
      font-weight: 700;
    }

    .footer .inv {
      background: var(--oled);
      color: #031503;
      padding: 1px 3px;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    button {
      border: 1px solid #3a4656;
      background: linear-gradient(180deg, #252c38, #1a202b);
      color: #d0e8d0;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
    }

    button:hover {
      border-color: #5b6f87;
    }

    .guide {
      font-size: 11px;
      color: #a7b9a7;
      text-align: center;
      max-width: 700px;
      line-height: 1.55;
    }

    .guide code {
      color: #d8f3d8;
      background: #11161d;
      border: 1px solid #2f3847;
      border-radius: 4px;
      padding: 1px 4px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <main class="layout">
    <div class="title">OLED 96x96 数码风界面草案</div>

    <section class="device">
      <div class="screen">
        <div class="pixels"></div>
        <div class="scan"></div>

        <div class="ui" id="uiRoot">
          <div class="hdr">
            <span>温控器</span>
            <span id="clockText">12:30</span>
          </div>

          <div class="tabs" id="tabs"></div>

          <div class="body" id="body"></div>

          <div class="footer">
            <span class="hint" id="footerHint"><span class="inv">INV</span> 确认</span>
            <span id="modeTag">NOR</span>
          </div>
        </div>
      </div>
    </section>

    <div class="toolbar">
      <button id="btnTab">切换</button>
      <button id="btnPrev">上</button>
      <button id="btnNext">下</button>
      <button id="btnMinus">-</button>
      <button id="btnPlus">+</button>
    </div>

    <p class="guide">
      5 键设备流程：模式键切换 普通/引导/专家；上/下移动焦点；加/减调整当前项；模式键长按用于专家分页。
      <br />
      引导模式按“步骤 - 现象 - 动作 - 结果”推进；普通模式设置 <code>TGT</code> 和 <code>SCN</code>；专家模式调节 <code>KP KI KD</code>、边界与 <code>TMIN/TMAX</code>。
    </p>
  </main>

  <script>
    const sceneProfiles = [
      {
        key: "FAST",
        label: "快热大锅",
        usage: "冷水起热 / 大水量",
        kp: 10.0,
        ki: 0.6,
        kd: 20.0
      },
      {
        key: "DAILY",
        label: "日常保温",
        usage: "反复开盖 / 日常使用",
        kp: 8.0,
        ki: 0.3,
        kd: 15.0
      },
      {
        key: "GENTLE",
        label: "小杯低冲",
        usage: "小容量 / 优先低超调",
        kp: 5.0,
        ki: 0.15,
        kd: 10.0
      }
    ];

    const guideSteps = [
      {
        title: "预热检查",
        metric: "升温斜率",
        tips: {
          "正常": "保持当前参数并继续观察",
          "升温慢": "KP +0.2，确认加热输出未饱和",
          "超调大": "先完成预热再判断超调",
          "波动大": "先完成预热再判断波动",
          "静差大": "预热阶段暂不处理静差"
        }
      },
      {
        title: "逼近目标",
        metric: "峰值温度",
        tips: {
          "正常": "继续进入稳态观察",
          "升温慢": "KP +0.2，必要时 KI +0.02",
          "超调大": "KP -0.2 或 KD +0.02",
          "波动大": "KP -0.1，降低逼近速度",
          "静差大": "先等待进入稳态"
        }
      },
      {
        title: "稳态观察",
        metric: "稳态误差",
        tips: {
          "正常": "误差合格，可准备验收",
          "升温慢": "KP +0.1，观察 2 个周期",
          "超调大": "KD +0.02，必要时 KI -0.01",
          "波动大": "KI -0.02，增加微分抑制",
          "静差大": "KI +0.02，必要时 KP +0.1"
        }
      },
      {
        title: "扰动恢复",
        metric: "恢复时间",
        tips: {
          "正常": "可进入结果验收",
          "升温慢": "KP +0.1 提升恢复速度",
          "超调大": "KD +0.02 抑制二次过冲",
          "波动大": "KP -0.1，增大滤波",
          "静差大": "KI +0.01 缩短偏差消除"
        }
      },
      {
        title: "结果验收",
        metric: "超调/误差",
        tips: {
          "正常": "保存为当前场景默认参数",
          "升温慢": "返回前一步继续微调 KP",
          "超调大": "返回前一步继续抑制过冲",
          "波动大": "返回稳态观察降低抖动",
          "静差大": "返回稳态观察补偿误差"
        }
      }
    ];

    const guideIssues = ["正常", "升温慢", "超调大", "波动大", "静差大"];

    const state = {
      tab: 0,
      expertPage: 0,
      selected: 0,
      flashKey: "",
      flashUntil: 0,
      footerTip: "",
      footerTipUntil: 0,
      normal: {
        tgt: 60,
        sceneIndex: 1
      },
      guide: {
        stepIndex: 0,
        issueIndex: 0,
        result: "观察中"
      },
      expert: {
        kp: 1.6,
        ki: 0.42,
        kd: 0.08,
        kpMin: 0.5,
        kpMax: 9.9,
        kiMin: 0.0,
        kiMax: 2.5,
        kdMin: 0.0,
        kdMax: 1.0,
        tmin: 20,
        tmax: 95
      }
    };

    const tabs = [
      { key: "普通", label: "普通模式" },
      { key: "引导", label: "引导整定" },
      { key: "专家", label: "专家模式" }
    ];

    function currentScene() {
      return sceneProfiles[state.normal.sceneIndex];
    }

    function flashRow(key) {
      state.flashKey = key;
      state.flashUntil = Date.now() + 320;
    }

    function showFooterTip(text, ms) {
      state.footerTip = text;
      state.footerTipUntil = Date.now() + (ms || 1200);
    }

    function clampPidToBounds() {
      const prevKp = state.expert.kp;
      const prevKi = state.expert.ki;
      const prevKd = state.expert.kd;

      state.expert.kp = clampFloat(state.expert.kp, state.expert.kpMin, state.expert.kpMax, 1);
      state.expert.ki = clampFloat(state.expert.ki, state.expert.kiMin, state.expert.kiMax, 2);
      state.expert.kd = clampFloat(state.expert.kd, state.expert.kdMin, state.expert.kdMax, 2);

      const changed = [];
      if (prevKp !== state.expert.kp) {
        changed.push("KP");
      }
      if (prevKi !== state.expert.ki) {
        changed.push("KI");
      }
      if (prevKd !== state.expert.kd) {
        changed.push("KD");
      }

      if (changed.length > 0) {
        flashRow(changed[0]);
        showFooterTip(`已限幅 ${changed.join("/")}`, 1400);
      }
    }

    function loadPidFromScene() {
      const preset = currentScene();
      state.expert.kp = preset.kp;
      state.expert.ki = preset.ki;
      state.expert.kd = preset.kd;
      clampPidToBounds();
    }

    function currentGuideStep() {
      return guideSteps[state.guide.stepIndex];
    }

    function currentGuideIssue() {
      return guideIssues[state.guide.issueIndex];
    }

    function guideSuggestion() {
      const step = currentGuideStep();
      return step.tips[currentGuideIssue()];
    }

    function applyGuideSuggestion() {
      const issue = currentGuideIssue();

      if (issue === "升温慢") {
        state.expert.kp = adjustFloatWithClamp("KP", state.expert.kp, 0.1, state.expert.kpMin, state.expert.kpMax, 1, 2);
      } else if (issue === "超调大") {
        state.expert.kp = adjustFloatWithClamp("KP", state.expert.kp, 0.1, state.expert.kpMin, state.expert.kpMax, 1, -2);
        state.expert.kd = adjustFloatWithClamp("KD", state.expert.kd, 0.01, state.expert.kdMin, state.expert.kdMax, 2, 2);
      } else if (issue === "波动大") {
        state.expert.kp = adjustFloatWithClamp("KP", state.expert.kp, 0.1, state.expert.kpMin, state.expert.kpMax, 1, -1);
        state.expert.ki = adjustFloatWithClamp("KI", state.expert.ki, 0.01, state.expert.kiMin, state.expert.kiMax, 2, -2);
      } else if (issue === "静差大") {
        state.expert.ki = adjustFloatWithClamp("KI", state.expert.ki, 0.01, state.expert.kiMin, state.expert.kiMax, 2, 2);
      }

      clampPidToBounds();
      state.guide.result = issue === "正常" ? "参数保持" : `已执行 ${issue}`;
      showFooterTip(state.guide.result, 1200);
    }

    function adjustFloatWithClamp(key, value, step, min, max, digits, delta) {
      const raw = value + delta * step;
      const next = clampFloat(raw, min, max, digits);
      const roundedRaw = Number(raw.toFixed(digits));
      if (next !== roundedRaw) {
        flashRow(key);
        showFooterTip(`${key} 达边界`, 1200);
      }
      return next;
    }

    function expertPages() {
      return [
        [
          {
            key: "KP",
            label: "KP",
            value: state.expert.kp.toFixed(1),
            adjustable: true,
            adjust(delta) {
              state.expert.kp = adjustFloatWithClamp("KP", state.expert.kp, 0.1, state.expert.kpMin, state.expert.kpMax, 1, delta);
            }
          },
          {
            key: "KI",
            label: "KI",
            value: state.expert.ki.toFixed(2),
            adjustable: true,
            adjust(delta) {
              state.expert.ki = adjustFloatWithClamp("KI", state.expert.ki, 0.01, state.expert.kiMin, state.expert.kiMax, 2, delta);
            }
          },
          {
            key: "KD",
            label: "KD",
            value: state.expert.kd.toFixed(2),
            adjustable: true,
            adjust(delta) {
              state.expert.kd = adjustFloatWithClamp("KD", state.expert.kd, 0.01, state.expert.kdMin, state.expert.kdMax, 2, delta);
            }
          },
          {
            key: "KPL",
            label: "KPL",
            value: state.expert.kpMin.toFixed(1),
            adjustable: true,
            adjust(delta) {
              state.expert.kpMin = adjustFloatWithClamp("KPL", state.expert.kpMin, 0.1, 0.0, state.expert.kpMax - 0.1, 1, delta);
              clampPidToBounds();
            }
          },
          {
            key: "KPH",
            label: "KPH",
            value: state.expert.kpMax.toFixed(1),
            adjustable: true,
            adjust(delta) {
              state.expert.kpMax = adjustFloatWithClamp("KPH", state.expert.kpMax, 0.1, state.expert.kpMin + 0.1, 20.0, 1, delta);
              clampPidToBounds();
            }
          },
          {
            key: "KIL",
            label: "KIL",
            value: state.expert.kiMin.toFixed(2),
            adjustable: true,
            adjust(delta) {
              state.expert.kiMin = adjustFloatWithClamp("KIL", state.expert.kiMin, 0.01, 0.0, state.expert.kiMax - 0.01, 2, delta);
              clampPidToBounds();
            }
          }
        ],
        [
          {
            key: "KIH",
            label: "KIH",
            value: state.expert.kiMax.toFixed(2),
            adjustable: true,
            adjust(delta) {
              state.expert.kiMax = adjustFloatWithClamp("KIH", state.expert.kiMax, 0.01, state.expert.kiMin + 0.01, 10.0, 2, delta);
              clampPidToBounds();
            }
          },
          {
            key: "KDL",
            label: "KDL",
            value: state.expert.kdMin.toFixed(2),
            adjustable: true,
            adjust(delta) {
              state.expert.kdMin = adjustFloatWithClamp("KDL", state.expert.kdMin, 0.01, 0.0, state.expert.kdMax - 0.01, 2, delta);
              clampPidToBounds();
            }
          },
          {
            key: "KDH",
            label: "KDH",
            value: state.expert.kdMax.toFixed(2),
            adjustable: true,
            adjust(delta) {
              state.expert.kdMax = adjustFloatWithClamp("KDH", state.expert.kdMax, 0.01, state.expert.kdMin + 0.01, 5.0, 2, delta);
              clampPidToBounds();
            }
          },
          {
            key: "TMIN",
            label: "TMIN",
            value: `${state.expert.tmin}C`,
            adjustable: true,
            adjust(delta) {
              state.expert.tmin = clampInt(state.expert.tmin + delta, 0, state.expert.tmax - 1);
              if (state.normal.tgt < state.expert.tmin) {
                state.normal.tgt = state.expert.tmin;
                showFooterTip("TGT 已抬升", 1200);
                flashRow("TMIN");
              }
            }
          },
          {
            key: "TMAX",
            label: "TMAX",
            value: `${state.expert.tmax}C`,
            adjustable: true,
            adjust(delta) {
              state.expert.tmax = clampInt(state.expert.tmax + delta, state.expert.tmin + 1, 120);
              if (state.normal.tgt > state.expert.tmax) {
                state.normal.tgt = state.expert.tmax;
                showFooterTip("TGT 已限幅", 1200);
                flashRow("TMAX");
              }
            }
          }
        ]
      ];
    }

    function rowsForTab() {
      if (state.tab === 0) {
        const scene = currentScene();
        return [
          {
            key: "TGT",
            label: "TGT",
            value: `${state.normal.tgt}C`,
            adjustable: true,
            adjust(delta) {
              state.normal.tgt = clampInt(state.normal.tgt + delta, 30, 99);
              if (state.normal.tgt > state.expert.tmax) {
                state.expert.tmax = state.normal.tgt;
                showFooterTip("TMAX 跟随 TGT", 1200);
                flashRow("TGT");
              }
            }
          },
          {
            key: "SCN",
            label: "场景",
            value: scene.label,
            adjustable: true,
            adjust(delta) {
              const len = sceneProfiles.length;
              state.normal.sceneIndex = (state.normal.sceneIndex + delta + len) % len;
              loadPidFromScene();
            },
            hint: `${scene.usage} / K${state.expert.kp.toFixed(1)} I${state.expert.ki.toFixed(2)} D${state.expert.kd.toFixed(2)}`
          }
        ];
      }

      if (state.tab === 1) {
        const step = currentGuideStep();
        const issue = currentGuideIssue();
        return [
          {
            key: "STEP",
            label: "步骤",
            value: `${state.guide.stepIndex + 1}/5 ${step.title}`,
            adjustable: true,
            adjust(delta) {
              state.guide.stepIndex = clampInt(state.guide.stepIndex + delta, 0, guideSteps.length - 1);
              state.guide.result = "观察中";
              showFooterTip(`切到 ${currentGuideStep().title}`, 1200);
            }
          },
          {
            key: "MET",
            label: "指标",
            value: step.metric,
            adjustable: false
          },
          {
            key: "ISS",
            label: "现象",
            value: issue,
            adjustable: true,
            adjust(delta) {
              const len = guideIssues.length;
              state.guide.issueIndex = (state.guide.issueIndex + delta + len) % len;
              state.guide.result = "观察中";
            },
            hint: guideSuggestion()
          },
          {
            key: "ACT",
            label: "动作",
            value: issue === "正常" ? "保持" : "应用建议",
            adjustable: true,
            adjust() {
              applyGuideSuggestion();
            }
          },
          {
            key: "PID",
            label: "参数",
            value: `K${state.expert.kp.toFixed(1)} I${state.expert.ki.toFixed(2)} D${state.expert.kd.toFixed(2)}`,
            adjustable: false
          },
          {
            key: "RES",
            label: "结果",
            value: state.guide.result,
            adjustable: false,
            hint: state.guide.stepIndex === guideSteps.length - 1 ? "通过后保存到当前场景" : "根据结果再进入下一步"
          }
        ];
      }

      const pages = expertPages();
      if (state.expertPage >= pages.length) {
        state.expertPage = 0;
      }
      return pages[state.expertPage];
    }

    function clampInt(v, min, max) {
      return Math.max(min, Math.min(max, Math.round(v)));
    }

    function clampFloat(v, min, max, digits) {
      const n = Math.max(min, Math.min(max, v));
      return Number(n.toFixed(digits));
    }

    function switchTab() {
      state.tab = (state.tab + 1) % tabs.length;
      if (state.tab !== 2) {
        state.expertPage = 0;
      }
      state.selected = 0;
      render();
    }

    function switchExpertPage() {
      if (state.tab !== 2) {
        return;
      }
      state.expertPage = state.expertPage === 0 ? 1 : 0;
      state.selected = 0;
      showFooterTip(`专家分页 P${state.expertPage + 1}`, 1200);
      render();
    }

    function moveSelection(step) {
      const rows = rowsForTab();
      const len = rows.length;
      state.selected = (state.selected + step + len) % len;
      render();
    }

    function adjustValue(delta) {
      const rows = rowsForTab();
      const row = rows[state.selected];
      if (!row || !row.adjustable) {
        return;
      }
      row.adjust(delta);
      render();
    }

    function renderTabs() {
      const tabsEl = document.getElementById("tabs");
      tabsEl.innerHTML = "";

      tabs.forEach((t, idx) => {
        const el = document.createElement("div");
        el.className = `tab ${idx === state.tab ? "active" : ""}`;
        el.textContent = t.key;
        el.title = t.label;
        el.onclick = () => {
          state.tab = idx;
          state.selected = 0;
          render();
        };
        tabsEl.appendChild(el);
      });

      const modeTag = document.getElementById("modeTag");
      if (state.tab === 2) {
        modeTag.textContent = `${tabs[state.tab].key} P${state.expertPage + 1}`;
      } else {
        modeTag.textContent = tabs[state.tab].key;
      }
    }

    function renderRows() {
      const bodyEl = document.getElementById("body");
      const rows = rowsForTab();
      if (state.selected >= rows.length) {
        state.selected = 0;
      }
      bodyEl.innerHTML = "";

      rows.forEach((r, idx) => {
        const line = document.createElement("div");
        line.className = `line ${idx === state.selected ? "selected" : ""}`;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = r.label;

        const value = document.createElement("div");
        value.className = "value";
        value.textContent = r.value;
        if (state.flashKey === r.key && Date.now() < state.flashUntil) {
          value.classList.add("blink");
        }

        line.appendChild(label);
        line.appendChild(value);
        line.onclick = () => {
          state.selected = idx;
          render();
        };

        bodyEl.appendChild(line);

        if (r.hint) {
          const hint = document.createElement("div");
          hint.className = "scene-hint";
          hint.textContent = r.hint;
          bodyEl.appendChild(hint);
        }
      });
    }

    function renderClock() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      document.getElementById("clockText").textContent = `${hh}:${mm}`;
    }

    function render() {
      renderTabs();
      renderRows();
      const hint = document.getElementById("footerHint");
      const showWarn = state.footerTip && Date.now() < state.footerTipUntil;
      if (showWarn) {
        hint.textContent = state.footerTip;
        hint.className = "hint warn";
      } else {
        hint.innerHTML = '<span class="inv">INV</span> 确认';
        hint.className = "hint";
      }
      renderClock();
    }

    document.getElementById("btnTab").onclick = () => switchTab();
    document.getElementById("btnTab").ondblclick = () => switchExpertPage();
    document.getElementById("btnPrev").onclick = () => moveSelection(-1);
    document.getElementById("btnNext").onclick = () => moveSelection(1);
    document.getElementById("btnMinus").onclick = () => adjustValue(-1);
    document.getElementById("btnPlus").onclick = () => adjustValue(1);

    window.addEventListener("keydown", (e) => {
      if (e.key === "q" || e.key === "Q") {
        switchTab();
      } else if (e.key === "e" || e.key === "E") {
        switchExpertPage();
      } else if (e.key === "w" || e.key === "W" || e.key === "ArrowUp") {
        moveSelection(-1);
      } else if (e.key === "s" || e.key === "S" || e.key === "ArrowDown") {
        moveSelection(1);
      } else if (e.key === "a" || e.key === "A" || e.key === "ArrowLeft") {
        adjustValue(-1);
      } else if (e.key === "d" || e.key === "D" || e.key === "ArrowRight") {
        adjustValue(1);
      }
    });

    render();
    setInterval(renderClock, 15000);
  </script>
</body>
</html>
