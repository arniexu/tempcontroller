<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>128x64 OLED 极简 UI</title>
  <style>
    :root {
      --scale: 4;
      --bg: #05110b;
      --fg: #d9ffe9;
      --frame: #2e4b3e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0f0c;
      color: #d2e9db;
      font-family: "Noto Sans CJK SC", "SimSun", "Microsoft YaHei", monospace;
      padding: 20px;
    }
    .wrap { width: min(92vw, 760px); }
    .title { margin: 0 0 10px; font-size: 14px; color: #9fc5b1; }

    .oled {
      width: calc(128px * var(--scale));
      height: calc(64px * var(--scale));
      border: 1px solid var(--frame);
      background: var(--bg);
      position: relative;
      overflow: hidden;
      image-rendering: pixelated;
    }

    .screen {
      width: 128px;
      height: 64px;
      transform: scale(var(--scale));
      transform-origin: top left;
      position: absolute;
      inset: 0;
      color: var(--fg);
      background: var(--bg);
      font-smooth: never;
      -webkit-font-smoothing: none;
    }

    .cn16 { font-size: 16px; line-height: 16px; }
    .ascii8 {
      font-size: 8px;
      line-height: 8px;
      font-family: "Consolas", "Cascadia Mono", monospace;
      white-space: pre;
    }
    .ascii16 {
      font-size: 16px;
      line-height: 16px;
      font-family: "Consolas", "Cascadia Mono", monospace;
      white-space: pre;
    }
    .p { position: absolute; }

    .notes {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.5;
      color: #9fc5b1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">0.96" OLED（128×64）极简界面（真实像素约束）</h1>
    <div class="oled" role="img" aria-label="温控器 OLED 极简界面">
      <div class="screen">
        <!-- 中文按 16x16 字模规划 -->
        <div class="p cn16" style="left:0px; top:0px;">温控</div>
        <div class="p cn16" style="left:0px; top:16px;">当前</div>
        <div class="p cn16" style="left:0px; top:32px;">目标</div>

        <!-- 数值按 ASCII 6x8/8x16 风格规划 -->
        <div class="p ascii16" style="left:34px; top:16px;">23.8C</div>
        <div class="p ascii16" style="left:34px; top:32px;">25.0C</div>
        <div class="p ascii8" style="left:0px; top:56px;">PID P3.2 I0.15 D1.0</div>
      </div>
    </div>

    <div class="notes">
      画面严格使用 128×64 逻辑像素布局；中文按 16×16，底部 PID 行按 8 像素高 ASCII 排列。
    </div>
  </div>
</body>
</html>
