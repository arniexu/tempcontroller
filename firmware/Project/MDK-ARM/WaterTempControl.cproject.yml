        - file: ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/STM32F10x_StdPeriph_Driver/src/stm32f10x_sdio.c
        - file: ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/STM32F10x_StdPeriph_Driver/src/stm32f10x_spi.c
