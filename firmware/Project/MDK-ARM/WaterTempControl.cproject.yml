project:
  packs:
    - pack: Keil::STM32F1xx_DFP@^2.4.1
  setups:
    - setup: Debug-HWTest
      add-path:
        - ../../Core/Inc
        - ../../Drivers/BSP
        - ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Inc
        - ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Inc/Legacy
        - ../../ThirdParty/STM32CubeF1/Drivers/CMSIS/Include
        - ../../ThirdParty/STM32CubeF1/Drivers/CMSIS/Device/ST/STM32F1xx/Include
      debug: "on"
      define:
        - USE_HAL_DRIVER
        - STM32F103xB
        - APP_BUILD_DEBUG
        - APP_HW_DRIVER_TEST_DISPLAY
      misc:
        - C:
            - -std=c99
  groups:
    - group: CORE
      files:
        - file: ../../Core/Src/main.c
        - file: ../../Core/Src/app_main.c
        - file: ../../Core/Src/scheduler.c
        - file: ../../Core/Src/debug_log.c
        - file: ../../Core/Src/temp_manager.c
        - file: ../../Core/Src/pid_ctrl.c
        - file: ../../Core/Src/heater_ctrl.c
        - file: ../../Core/Src/alarm_service.c
        - file: ../../Core/Src/schedule_service.c
        - file: ../../Core/Src/param_store.c
        - file: ../../Core/Src/log_service.c
        - file: ../../Core/Src/ui_service.c
        - file: ../../Core/Src/protocol_export.c
    - group: BSP
      files:
        - file: ../../Drivers/BSP/bsp_ds18b20.c
        - file: ../../Drivers/BSP/bsp_buzzer.c
        - file: ../../Drivers/BSP/bsp_eeprom.c
        - file: ../../Drivers/BSP/bsp_key.c
        - file: ../../Drivers/BSP/bsp_lcd_8080.c
        - file: ../../Drivers/BSP/tiny_graphics.c
        - file: ../../Drivers/BSP/bsp_relay.c
        - file: ../../Drivers/BSP/bsp_rtc.c
        - file: ../../Drivers/BSP/bsp_uart.c
        - file: ../../Drivers/BSP/bsp_spiflash.c
    - group: CMSIS
      files:
        - file: ../../ThirdParty/STM32CubeF1/Drivers/CMSIS/Device/ST/STM32F1xx/Source/Templates/system_stm32f1xx.c
        - file: ./startup_stm32f103xb_ac6.S
    - group: HAL
      files:
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_cortex.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_rcc.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_rcc_ex.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_gpio.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_dma.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_flash.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_flash_ex.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_pwr.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_crc.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_rtc.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_rtc_ex.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_tim.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_tim_ex.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_uart.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_spi.c
        - file: ../../ThirdParty/STM32CubeF1/Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_i2c.c
