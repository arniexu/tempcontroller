project:
  packs:
    - pack: Keil::STM32F1xx_DFP@^2.4.1
  setups:
    - setup: Debug-HWTest
      add-path:
        - ../../Core/Inc
        - ../../Drivers/BSP
        - ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/STM32F10x_StdPeriph_Driver/inc
        - ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/CMSIS/CM3/CoreSupport
        - ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/CMSIS/CM3/DeviceSupport/ST/STM32F10x
      debug: "on"
      define:
        - USE_STDPERIPH_DRIVER
        - STM32F10X_MD
        - APP_BUILD_DEBUG
        - APP_HW_DRIVER_TEST_DISPLAY
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
    - setup: Release
      add-path:
        - ../../Core/Inc
        - ../../Drivers/BSP
        - ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/STM32F10x_StdPeriph_Driver/inc
        - ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/CMSIS/CM3/CoreSupport
        - ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/CMSIS/CM3/DeviceSupport/ST/STM32F10x
      debug: "off"
      define:
        - USE_STDPERIPH_DRIVER
        - STM32F10X_MD
        - APP_BUILD_RELEASE
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wno-packed
            - -Wno-missing-variable-declarations
            - -Wno-missing-prototypes
            - -Wno-missing-noreturn
            - -Wno-sign-conversion
            - -Wno-nonportable-include-path
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  groups:
    - group: BSP
      files:
        - file: ../../Drivers/BSP/bsp_ds18b20.c
        - file: ../../Drivers/BSP/bsp_relay.c
        - file: ../../Drivers/BSP/bsp_rtc.c
        - file: ../../Drivers/BSP/bsp_uart.c
    - group: CORE
      files:
        - file: ../../Core/Src/alarm_service.c
        - file: ../../Core/Src/app_main.c
        - file: ../../Core/Src/debug_log.c
        - file: ../../Core/Src/heater_ctrl.c
        - file: ../../Core/Src/log_service.c
        - file: ../../Core/Src/main.c
        - file: ../../Core/Src/param_store.c
        - file: ../../Core/Src/pid_ctrl.c
        - file: ../../Core/Src/protocol_export.c
        - file: ../../Core/Src/schedule_service.c
        - file: ../../Core/Src/scheduler.c
        - file: ../../Core/Src/temp_manager.c
        - file: ../../Core/Src/ui_service.c
    - group: CMSIS
      files:
        - file: ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/CMSIS/CM3/DeviceSupport/ST/STM32F10x/system_stm32f10x.c
        - file: ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/CMSIS/CM3/DeviceSupport/ST/STM32F10x/startup/arm/startup_stm32f10x_md.s
    - group: STD
      files:
        - file: ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/STM32F10x_StdPeriph_Driver/src/misc.c
        - file: ../../ThirdParty/stm32f10x-stdperiph-lib/Libraries/STM32F10x_StdPeriph_Driver/src/stm32f10x_adc.c
